<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Thông báo đơn hàng mới</title>
  <style>
    .btn {
      display: inline-block;
      padding: 12px 24px;
      background: #FF9800;
      color: #fff;
      text-decoration: none;
      border-radius: 4px;
      font-weight: bold;
    }
    .container {
      max-width: 500px;
      margin: 0 auto;
      font-family: Arial, sans-serif;
      background: #f9f9f9;
      padding: 24px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .order-info {
      background: #fff;
      padding: 16px;
      border-radius: 6px;
      margin-bottom: 16px;
      border: 1px solid #eee;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Xin chào {{name}},</h2>
    <p>Đơn hàng của bạn đã được tạo thành công tại {{appName}}!</p>
    <div class="order-info">
      <p><strong>Mã đơn hàng:</strong> {{orderCode}}</p>
      <p><strong>Tổng tiền:</strong> {{totalAmount}} VND</p>
      <p><strong>Trạng thái:</strong> {{status}}</p>
    </div>
    <p style="text-align:center;">
      <a href="{{orderUrl}}" class="btn">Xem chi tiết đơn hàng</a>
    </p>
    <p>Cảm ơn bạn đã mua sắm tại {{appName}}!</p>
    <p>Trân trọng,<br>{{appName}} Team</p>
  </div>
</body>
</html>
